<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Admin | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#0F172A", accent: "#3B82F6", "background-dark": "#0B1120", "card-dark": "#1E293B" } } } };
    </script>
    <style>
        body { min-height: 100vh; } ::-webkit-scrollbar { display: none; }
        .input-field { width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; border: 1px solid #334155; background-color: #0F172A; color: white; outline: none; }
        .input-field:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100%); opacity: 0; transition: all 0.3s; z-index: 100; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .notify-cb { width: 20px; height: 20px; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body class="bg-background-dark text-white font-sans pb-12">
    
    <header class="px-6 py-5 flex justify-between items-center border-b border-slate-800 bg-background-dark/95 sticky top-0 z-50">
        <h1 class="text-xl font-extrabold flex items-center gap-2"><span class="material-icons-round text-accent">admin_panel_settings</span> Setup</h1>
        <button class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-900/30 text-emerald-400 hover:bg-emerald-900/50" onclick="notifyDad()"><span class="material-icons-round">send</span></button>
    </header>

    <main class="flex-1 px-4 pt-6 max-w-lg w-full mx-auto flex flex-col gap-6">
        
        <section class="bg-card-dark rounded-2xl shadow-sm border border-slate-800 p-5">
            <h2 class="text-sm font-bold text-white flex items-center gap-2 mb-3"><span class="material-icons-round text-emerald-500">document_scanner</span> OCR Auto-Fill</h2>
            <input type="file" id="receipt-upload" accept="image/*" class="block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-emerald-900/30 file:text-emerald-400 mb-3 cursor-pointer">
            <div id="scanner-status" class="hidden flex items-center gap-2 text-xs font-bold text-blue-400 bg-blue-900/20 p-3 rounded-lg"><span class="material-icons-round animate-spin">refresh</span> Scanning...</div>
            <div id="scanned-results" class="hidden mt-3 flex flex-col gap-2">
                <input type="text" id="scan-tx" class="input-field py-2 text-xs" placeholder="Txn ID">
                <input type="text" id="scan-cnum" class="input-field py-2 text-xs" placeholder="Consumer No.">
                <button onclick="copyToClipboard()" class="bg-emerald-600 text-white font-bold py-2 rounded-lg text-sm mt-1">Copy Data String</button>
            </div>
        </section>

        <section class="bg-card-dark rounded-2xl shadow-sm border border-slate-800 p-5">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Add Entry</h2>
            <div class="flex flex-col gap-3">
                <select id="new-category" class="input-field text-accent" onchange="toggleInputFields()">
                    <option value="mobile">📱 Mobile</option>
                    <option value="electricity">⚡ Electricity</option>
                </select>
                <input type="text" id="new-title-mobile" class="input-field" placeholder="Recharge Name">
                <div id="field-elec-title" class="hidden flex gap-2">
                    <select id="new-house" class="input-field w-1/2"><option value="MD">MD</option><option value="UD - STORE">UD - STORE</option><option value="UD - MAIN HOUSE">UD - MAIN HOUSE</option></select>
                    <input type="text" id="new-month" class="input-field w-1/2 text-accent" placeholder="Month (e.g. Jan)">
                </div>
                <input type="number" id="new-amount" class="input-field" placeholder="Amount ₹">
                <button onclick="addBill()" class="bg-white text-slate-900 font-bold py-3 rounded-xl mt-1">Save to Database</button>
            </div>
        </section>

        <section><h3 class="text-sm font-bold text-slate-400 uppercase mb-3">📱 Recharges</h3><div id="admin-recharges" class="flex flex-col gap-3"></div></section>
        <section><h3 class="text-sm font-bold text-slate-400 uppercase mb-3">⚡ Electricity</h3><div id="admin-electricity" class="flex flex-col gap-3"></div></section>

    </main>

    <div id="toast" class="bg-emerald-500 text-white px-5 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 text-sm"><span id="toast-msg">Success!</span></div>

    <script>
        function toggleInputFields() {
            const cat = document.getElementById('new-category').value;
            if (cat === 'electricity') { document.getElementById('new-title-mobile').classList.add('hidden'); document.getElementById('field-elec-title').classList.remove('hidden'); document.getElementById('field-elec-title').classList.add('flex'); } 
            else { document.getElementById('new-title-mobile').classList.remove('hidden'); document.getElementById('field-elec-title').classList.add('hidden'); document.getElementById('field-elec-title').classList.remove('flex'); }
        }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient('https://hzwjzpwhjpkwbnevylcr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6d2p6cHdoanBrd2JuZXZ5bGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDA1MzEsImV4cCI6MjA4NzA3NjUzMX0.3p7DkH9IqClw8P_FbAUJnCaX6jflsb9HchbHDnd3J1M');

        function showToast(msg) { document.getElementById('toast-msg').innerText = msg; document.getElementById('toast').classList.add('show'); setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000); }

        window.currentBills = [];

        // OCR Engine
        document.getElementById('receipt-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            document.getElementById('scanner-status').classList.remove('hidden'); document.getElementById('scanned-results').classList.add('hidden');
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                const txMatch = text.match(/(?:Txn|Transaction|BBPS|Ref)[\s\.:-]*([A-Z0-9]{8,22})/i);
                const cnumMatch = text.match(/(?:Consumer|Account|Cons|Customer)[\sNo\.:-]*([a-zA-Z0-9]{7,15})/i);
                
                document.getElementById('scan-tx').value = txMatch ? txMatch[1] : '';
                document.getElementById('scan-cnum').value = cnumMatch ? cnumMatch[1] : '';
                
                document.getElementById('scanner-status').classList.add('hidden'); document.getElementById('scanned-results').classList.remove('hidden');
            } catch (err) { alert("Scan failed."); document.getElementById('scanner-status').classList.add('hidden'); }
        });

        window.copyToClipboard = function() {
            const tx = document.getElementById('scan-tx').value; const cnum = document.getElementById('scan-cnum').value;
            navigator.clipboard.writeText(`C:${cnum}|T:${tx}`); showToast("Copied! Paste in Receipt Data.");
        }

        window.loadAdmin = async function() {
            const { data, error } = await supabase.from('family_bills').select('*').order('id');
            if (error) return;
            window.currentBills = data;
            const rec = document.getElementById('admin-recharges'); const elec = document.getElementById('admin-electricity');
            rec.innerHTML = elec.innerHTML = '';
            
            data.forEach(bill => {
                const isPaid = bill.status === 'paid';
                const cb = !isPaid ? `<input type="checkbox" value="${bill.id}" class="notify-cb bg-slate-800">` : ``;
                
                const card = `
                <div class="bg-card-dark p-4 rounded-xl border border-slate-800 flex flex-col gap-3">
                    <div class="flex justify-between items-center"><div class="flex gap-2">${cb}<h4 class="font-bold text-sm">${bill.title}</h4></div><button onclick="deleteBill('${bill.id}')" class="text-red-500 material-icons-round text-sm">delete</button></div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="amt-${bill.id}" value="${bill.amount}" class="input-field py-1 px-2 text-xs" placeholder="₹">
                        <select id="status-${bill.id}" class="input-field py-1 px-2 text-xs"><option value="pending" ${!isPaid?'selected':''}>Pending</option><option value="paid" ${isPaid?'selected':''}>Paid</option></select>
                    </div>
                    <input type="text" id="data-${bill.id}" value="${bill.due_date || ''}" class="input-field py-1 px-2 text-xs border-emerald-900/50" placeholder="Paste Scanned Receipt Data Here">
                    <button onclick="updateBill('${bill.id}')" class="bg-slate-800 text-white font-bold py-2 rounded-lg text-xs">Save Changes</button>
                </div>`;
                if(bill.category === 'mobile') rec.innerHTML += card; if(bill.category === 'electricity') elec.innerHTML += card;
            });
        }

        window.notifyDad = function() {
            const checked = Array.from(document.querySelectorAll('.notify-cb:checked')).map(cb => cb.value);
            if (checked.length === 0) { showToast("Check a pending bill!"); return; }
            const bills = window.currentBills.filter(b => checked.includes(b.id));
            let msg = `No. Of Pendings:- ${bills.length}\n`; let total = 0;
            bills.forEach(b => { total += parseFloat(b.amount); msg += `🔹 ${b.title} - ₹${b.amount}\n`; });
            msg += `\n*Total Due: ₹${total}*`;
            window.location.href = `whatsapp://send?phone=919735154326&text=${encodeURIComponent(msg)}`; // UPDATE NUMBER
        }

        window.addBill = async function() {
            const cat = document.getElementById('new-category').value; const amount = document.getElementById('new-amount').value;
            let title = cat === 'mobile' ? document.getElementById('new-title-mobile').value : `${document.getElementById('new-house').value} - ${document.getElementById('new-month').value}`;
            if (!title || !amount) return;
            const { error } = await supabase.from('family_bills').insert([{ title, amount, category: cat, status: 'pending' }]);
            if (!error) { showToast("Saved!"); loadAdmin(); }
        }

        window.updateBill = async function(id) {
            const amount = document.getElementById(`amt-${id}`).value; const status = document.getElementById(`status-${id}`).value; const data = document.getElementById(`data-${id}`).value;
            const { error } = await supabase.from('family_bills').update({ amount, due_date: data, status }).eq('id', id);
            if (!error) { showToast("Updated!"); loadAdmin(); }
        }

        window.deleteBill = async function(id) { if (confirm("Delete?")) { await supabase.from('family_bills').delete().eq('id', id); loadAdmin(); } }
        loadAdmin();
    </script>
</body>
</html>
