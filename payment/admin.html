<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>tailwind.config = { theme: { extend: { colors: { accent: "#3B82F6", "background-light": "#F8FAFC", "card-light": "#FFFFFF" } } } };</script>
    <style>
        body { min-height: 100vh; font-family: 'Inter', sans-serif; } ::-webkit-scrollbar { display: none; }
        .input-field { width: 100%; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1px solid #E2E8F0; background-color: #F8FAFC; color: #0F172A; outline: none; transition: 0.2s;}
        .input-field:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); background-color: #FFFFFF;}
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100%); opacity: 0; transition: all 0.3s; z-index: 100; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .notify-cb { width: 20px; height: 20px; border-radius: 6px; border-color: #CBD5E1; }
    </style>
</head>
<body class="bg-background-light text-slate-900 pb-12">
    
    <header class="px-6 py-5 flex justify-between items-center border-b border-slate-200 bg-white/95 sticky top-0 z-50 shadow-sm">
        <h1 class="text-xl font-extrabold flex items-center gap-2"><span class="material-icons-round text-accent">admin_panel_settings</span> Setup</h1>
        <button class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-100 text-emerald-600 hover:bg-emerald-200" onclick="notifyDad()"><span class="material-icons-round">send</span></button>
    </header>

    <main class="flex-1 px-4 pt-6 max-w-lg w-full mx-auto flex flex-col gap-6">
        
        <section class="bg-card-light rounded-2xl shadow-sm border border-slate-200 p-5">
            <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2 mb-3"><span class="material-icons-round text-emerald-500">document_scanner</span> OCR Scanner</h2>
            <input type="file" id="receipt-upload" accept="image/*" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-emerald-50 file:text-emerald-600 mb-3 cursor-pointer">
            <div id="scanner-status" class="hidden flex items-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 p-3 rounded-lg"><span class="material-icons-round animate-spin">refresh</span> Scanning...</div>
            
            <div id="scanned-results" class="hidden mt-3 grid grid-cols-2 gap-2">
                <input type="text" id="scan-tx" class="input-field py-2 text-xs" placeholder="B Connect Txn ID">
                <input type="text" id="scan-cname" class="input-field py-2 text-xs" placeholder="Customer Name">
                <input type="text" id="scan-bp" class="input-field py-2 text-xs" placeholder="Bill Period">
                <input type="text" id="scan-bdt" class="input-field py-2 text-xs" placeholder="Bill Date">
                <input type="text" id="scan-ddt" class="input-field py-2 text-xs" placeholder="Due Date">
                <input type="text" id="scan-am" class="input-field py-2 text-xs" placeholder="Amount">
            </div>
        </section>

        <section class="bg-card-light rounded-2xl shadow-sm border border-slate-200 p-5">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">Add Entry</h2>
            <div class="flex flex-col gap-3">
                <select id="new-category" class="input-field text-accent font-bold" onchange="toggleInputFields()"><option value="mobile">📱 Mobile</option><option value="electricity">⚡ Electricity</option></select>
                <input type="text" id="new-title-mobile" class="input-field" placeholder="Recharge Name">
                <div id="field-elec-title" class="hidden flex gap-2">
                    <select id="new-house" class="input-field w-1/2 font-bold"><option value="MD">MD</option><option value="UD - STORE">UD - STORE</option><option value="UD - MAIN HOUSE">UD - MAIN HOUSE</option></select>
                    <input type="text" id="new-month" class="input-field w-1/2 text-accent font-bold" placeholder="Month (e.g. Jan)">
                </div>
                <input type="number" id="new-amount" class="input-field font-bold" placeholder="Amount ₹">
                <button onclick="addBill()" class="bg-slate-900 text-white font-bold py-3 rounded-xl mt-1 shadow-md">Save to Database</button>
            </div>
        </section>

        <section><h3 class="text-sm font-bold text-slate-500 uppercase mb-3 px-1">📱 Recharges</h3><div id="admin-recharges" class="flex flex-col gap-3"></div></section>
        <section><h3 class="text-sm font-bold text-slate-500 uppercase mb-3 px-1">⚡ Electricity</h3><div id="admin-electricity" class="flex flex-col gap-3"></div></section>

    </main>

    <div id="toast" class="bg-emerald-500 text-white px-5 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 text-sm"><span id="toast-msg">Success!</span></div>

    <script>
        function toggleInputFields() {
            const cat = document.getElementById('new-category').value;
            if (cat === 'electricity') { document.getElementById('new-title-mobile').classList.add('hidden'); document.getElementById('field-elec-title').classList.remove('hidden'); document.getElementById('field-elec-title').classList.add('flex'); } 
            else { document.getElementById('new-title-mobile').classList.remove('hidden'); document.getElementById('field-elec-title').classList.add('hidden'); document.getElementById('field-elec-title').classList.remove('flex'); }
        }
        function toggleEdit(id) { document.getElementById(`edit-${id}`).classList.toggle('hidden'); }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient('https://hzwjzpwhjpkwbnevylcr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6d2p6cHdoanBrd2JuZXZ5bGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDA1MzEsImV4cCI6MjA4NzA3NjUzMX0.3p7DkH9IqClw8P_FbAUJnCaX6jflsb9HchbHDnd3J1M');

        function showToast(msg) { document.getElementById('toast-msg').innerText = msg; document.getElementById('toast').classList.add('show'); setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000); }

        window.currentBills = [];

        document.getElementById('receipt-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            document.getElementById('scanner-status').classList.remove('hidden'); document.getElementById('scanned-results').classList.add('hidden');
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                
                const txMatch = text.match(/(?:Txn|Transaction|BBPS|Ref|Connect)[\s\.:-]*([A-Z0-9]{8,22})/i);
                const nameMatch = text.match(/(?:Customer|Name)[\s\.:-]*([A-Za-z\s]{3,20})/i);
                const bpMatch = text.match(/(?:Period)[\s\.:-]*([A-Za-z]{3,9}\s*[-to]*\s*[A-Za-z]{3,9}|\w+\s*\d{4})/i);
                const bdtMatch = text.match(/(?:Bill Date|Date)[\s\.:-]*([\d]{1,2}[/-][\w]{2,9}[/-][\d]{2,4})/i);
                const ddtMatch = text.match(/(?:Due Date|Due)[\s\.:-]*([\d]{1,2}[/-][\w]{2,9}[/-][\d]{2,4})/i);
                const amMatch = text.match(/(?:Amount|Total)[\s\.:-]*₹?\s*([\d,\.]+)/i);
                
                document.getElementById('scan-tx').value = txMatch ? txMatch[1] : '';
                document.getElementById('scan-cname').value = nameMatch ? nameMatch[1].trim() : '';
                document.getElementById('scan-bp').value = bpMatch ? bpMatch[1] : '';
                document.getElementById('scan-bdt').value = bdtMatch ? bdtMatch[1] : '';
                document.getElementById('scan-ddt').value = ddtMatch ? ddtMatch[1] : '';
                document.getElementById('scan-am').value = amMatch ? amMatch[1] : '';
                
                document.getElementById('scanner-status').classList.add('hidden'); document.getElementById('scanned-results').classList.remove('hidden');
                showToast("Data Extracted! Type directly into fields.");
            } catch (err) { alert("Scan failed."); document.getElementById('scanner-status').classList.add('hidden'); }
        });

        window.loadAdmin = async function() {
            const { data, error } = await supabase.from('family_bills').select('*').order('id');
            if (error) return;
            window.currentBills = data;
            const rec = document.getElementById('admin-recharges'); const elec = document.getElementById('admin-electricity');
            rec.innerHTML = elec.innerHTML = '';
            
            data.forEach(bill => {
                const isPaid = bill.status === 'paid';
                const cb = !isPaid ? `<input type="checkbox" value="${bill.id}" class="notify-cb bg-white border-slate-300">` : ``;
                
                let rData = { tx: "", cname: "", ddt: "", bdt: "", bp: "", mode: "EG Payments", am: bill.amount, pdt: new Date().toLocaleDateString('en-IN') };
                if (bill.due_date && bill.due_date.startsWith('{')) { try { rData = JSON.parse(bill.due_date); } catch(e){} }

                const card = `
                <div class="bg-white p-4 rounded-xl border border-slate-200 flex flex-col gap-3 shadow-sm">
                    <div class="flex justify-between items-center"><div class="flex items-center gap-2">${cb}<h4 class="font-bold text-slate-900 text-sm">${bill.title}</h4></div><button onclick="deleteBill('${bill.id}')" class="text-red-500 material-icons-round text-sm hover:bg-red-50 p-1 rounded-full">delete</button></div>
                    
                    <div class="flex justify-between gap-2 mt-1">
                        <select id="status-${bill.id}" class="input-field py-1.5 px-2 text-xs w-1/2 font-bold"><option value="pending" ${!isPaid?'selected':''}>Pending</option><option value="paid" ${isPaid?'selected':''}>Paid</option></select>
                        <button onclick="toggleEdit('${bill.id}')" class="w-1/2 bg-blue-50 text-blue-600 font-bold py-1.5 rounded-lg text-xs border border-blue-100">Edit Details ▼</button>
                    </div>

                    <div id="edit-${bill.id}" class="hidden flex flex-col gap-2 mt-2 p-3 bg-slate-50 rounded-lg border border-slate-200">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="tx-${bill.id}" value="${rData.tx}" class="input-field py-1.5 text-xs bg-white" placeholder="Txn ID">
                            <input type="text" id="cname-${bill.id}" value="${rData.cname}" class="input-field py-1.5 text-xs bg-white" placeholder="Customer Name">
                            <input type="text" id="bdt-${bill.id}" value="${rData.bdt}" class="input-field py-1.5 text-xs bg-white" placeholder="Bill Date">
                            <input type="text" id="ddt-${bill.id}" value="${rData.ddt}" class="input-field py-1.5 text-xs bg-white" placeholder="Due Date">
                            <input type="text" id="bp-${bill.id}" value="${rData.bp}" class="input-field py-1.5 text-xs bg-white" placeholder="Bill Period">
                            <input type="text" id="mode-${bill.id}" value="${rData.mode}" class="input-field py-1.5 text-xs bg-white" placeholder="Mode">
                            <input type="number" id="am-${bill.id}" value="${rData.am}" class="input-field py-1.5 text-xs bg-white" placeholder="Amount ₹">
                            <input type="text" id="pdt-${bill.id}" value="${rData.pdt}" class="input-field py-1.5 text-xs bg-white" placeholder="Payment Date">
                        </div>
                    </div>

                    <button onclick="updateBill('${bill.id}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-xs mt-1 transition shadow-sm">Save & Sync</button>
                </div>`;
                if(bill.category === 'mobile') rec.innerHTML += card; if(bill.category === 'electricity') elec.innerHTML += card;
            });
        }

        window.notifyDad = function() {
            const checked = Array.from(document.querySelectorAll('.notify-cb:checked')).map(cb => cb.value);
            if (checked.length === 0) { showToast("Check a pending bill!"); return; }
            const bills = window.currentBills.filter(b => checked.includes(b.id));
            let msg = `No. Of Pendings:- ${bills.length}\n`; let total = 0;
            bills.forEach(b => { total += parseFloat(b.amount); msg += `🔹 ${b.title} - ₹${b.amount}\n`; });
            msg += `\n*Total Due: ₹${total}*`;
            window.location.href = `whatsapp://send?phone=919735154326&text=${encodeURIComponent(msg)}`; // UPDATE NUMBER
        }

        window.addBill = async function() {
            const cat = document.getElementById('new-category').value; const amount = document.getElementById('new-amount').value;
            let title = cat === 'mobile' ? document.getElementById('new-title-mobile').value : `${document.getElementById('new-house').value} - ${document.getElementById('new-month').value}`;
            if (!title || !amount) return;
            const { error } = await supabase.from('family_bills').insert([{ title, amount, category: cat, status: 'pending' }]);
            if (!error) { showToast("Saved!"); loadAdmin(); }
        }

        window.updateBill = async function(id) {
            const status = document.getElementById(`status-${id}`).value;
            const recData = {
                tx: document.getElementById(`tx-${id}`).value,
                cname: document.getElementById(`cname-${id}`).value,
                bdt: document.getElementById(`bdt-${id}`).value,
                ddt: document.getElementById(`ddt-${id}`).value,
                bp: document.getElementById(`bp-${id}`).value,
                mode: document.getElementById(`mode-${id}`).value,
                am: document.getElementById(`am-${id}`).value,
                pdt: document.getElementById(`pdt-${id}`).value
            };
            const { error } = await supabase.from('family_bills').update({ amount: recData.am, due_date: JSON.stringify(recData), status }).eq('id', id);
            if (!error) { showToast("Synced!"); loadAdmin(); }
        }

        window.deleteBill = async function(id) { if (confirm("Delete?")) { await supabase.from('family_bills').delete().eq('id', id); loadAdmin(); } }
        loadAdmin();
    </script>
</body>
</html>
