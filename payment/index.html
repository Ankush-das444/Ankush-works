<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Family Hub App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: "class", theme: { extend: { colors: { accent: "#3B82F6", "background-dark": "#0B1120", "card-dark": "#1E293B" } } } };</script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #0B1120; color: white; min-height: 100vh; overflow-x: hidden; } ::-webkit-scrollbar { display: none; }</style>
</head>
<body class="flex flex-col antialiased">
    
    <header class="px-6 py-5 flex justify-between items-center sticky top-0 bg-background-dark/95 backdrop-blur-md z-40 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <button id="btn-back" class="hidden h-10 w-10 flex items-center justify-center rounded-full bg-slate-800 text-slate-300" onclick="showView('home')"><span class="material-icons-round">arrow_back</span></button>
            <div>
                <h1 id="header-title" class="text-2xl font-extrabold tracking-tight">Family Hub</h1>
                <p id="header-subtitle" class="text-xs text-slate-400">Utility Center</p>
            </div>
        </div>
        <button class="p-2 rounded-full bg-slate-800 text-slate-300" onclick="window.loadData()"><span class="material-icons-round">refresh</span></button>
    </header>

    <main class="flex-1 px-4 py-6 max-w-lg w-full mx-auto">
        <div id="view-home" class="flex flex-col gap-6 justify-center h-full pb-20">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="showView('recharge')" class="bg-card-dark rounded-3xl p-6 border border-slate-800 flex flex-col items-center text-center cursor-pointer active:scale-95">
                    <div class="w-16 h-16 rounded-2xl bg-blue-900/30 text-blue-400 flex items-center justify-center mb-4"><span class="material-icons-round text-3xl">smartphone</span></div>
                    <h3 class="font-bold">Mobile<br>Recharge</h3>
                    <span id="badge-recharge" class="mt-3 text-[10px] font-bold bg-slate-800 text-slate-500 px-3 py-1 rounded-full">Loading...</span>
                </div>
                <div onclick="showView('electricity')" class="bg-card-dark rounded-3xl p-6 border border-slate-800 flex flex-col items-center text-center cursor-pointer active:scale-95">
                    <div class="w-16 h-16 rounded-2xl bg-yellow-900/30 text-yellow-400 flex items-center justify-center mb-4"><span class="material-icons-round text-3xl">bolt</span></div>
                    <h3 class="font-bold">Electricity<br>Postpaid</h3>
                    <span id="badge-electricity" class="mt-3 text-[10px] font-bold bg-slate-800 text-slate-500 px-3 py-1 rounded-full">Loading...</span>
                </div>
            </div>
        </div>

        <div id="view-recharge" class="hidden flex-col gap-4">
            <h3 class="text-sm font-bold text-slate-400 uppercase">Active Connections</h3>
            <div id="recharge-list" class="flex flex-col gap-3"></div>
        </div>

        <div id="view-electricity" class="hidden flex-col gap-4">
            <div class="flex justify-between items-center">
                <h3 class="text-sm font-bold text-slate-400 uppercase">Registered Houses</h3>
                <select id="house-filter" onchange="renderElectricity()" class="text-xs font-bold bg-slate-800 text-slate-300 rounded-lg px-3 py-2 border-none outline-none">
                    <option value="ALL">All Houses</option><option value="MD">MD</option><option value="UD - STORE">UD - STORE</option><option value="UD - MAIN HOUSE">UD - MAIN HOUSE</option>
                </select>
            </div>
            <div id="electricity-list" class="flex flex-col gap-3"></div>
        </div>
    </main>

    <script>
        function showView(id) {
            ['home', 'recharge', 'electricity'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${id}`).classList.remove('hidden');
            document.getElementById('btn-back').classList.toggle('hidden', id === 'home');
            document.getElementById('header-title').innerText = id === 'home' ? 'Family Hub' : id === 'recharge' ? 'Recharges' : 'Electricity';
            document.getElementById('header-subtitle').innerText = id === 'home' ? 'Utility Center' : id === 'recharge' ? 'Mobile Connections' : 'Postpaid Bills';
            if(id === 'electricity' && window.renderElectricity) { document.getElementById('house-filter').value = "ALL"; window.renderElectricity(); }
        }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient('https://hzwjzpwhjpkwbnevylcr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6d2p6cHdoanBrd2JuZXZ5bGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDA1MzEsImV4cCI6MjA4NzA3NjUzMX0.3p7DkH9IqClw8P_FbAUJnCaX6jflsb9HchbHDnd3J1M');
        
        const VERCEL_PAY = "https://ankush-worksltd.vercel.app/api/pay";
        const VERCEL_RECEIPT = "https://ankush-worksltd.vercel.app/api/receipt";

        window.billsData = [];

        window.loadData = async function() {
            const { data } = await supabase.from('family_bills').select('*').order('id');
            window.billsData = data || [];
            
            const recs = window.billsData.filter(b => b.category === 'mobile');
            const elecs = window.billsData.filter(b => b.category === 'electricity');

            const upBadge = (id, count) => { const el = document.getElementById(id); if(count>0){ el.innerText=`${count} Action Required`; el.className="mt-3 text-[10px] font-bold bg-red-900/30 text-red-500 px-3 py-1 rounded-full animate-pulse"; }else{ el.innerText="All Settled"; el.className="mt-3 text-[10px] font-bold bg-emerald-900/30 text-emerald-400 px-3 py-1 rounded-full"; }};
            upBadge('badge-recharge', recs.filter(b=>b.status==='pending').length);
            upBadge('badge-electricity', elecs.filter(b=>b.status==='pending').length);

            const recList = document.getElementById('recharge-list'); recList.innerHTML = '';
            recs.forEach(bill => {
                const isPaid = bill.status === 'paid';
                const action = isPaid ? `<button class="px-4 py-2 rounded-lg bg-emerald-900/30 text-emerald-400 font-bold text-xs">Paid</button>` : `<a href="${VERCEL_PAY}?am=${bill.amount}&tn=${encodeURIComponent(bill.title)}" class="px-4 py-2 rounded-lg bg-accent text-white font-bold text-xs">Pay</a>`;
                recList.innerHTML += `<div class="flex justify-between items-center p-4 rounded-xl border border-slate-800 bg-slate-800/50 ${isPaid?'opacity-60':''}"><div><p class="font-bold text-sm">${bill.title}</p><p class="text-xs text-slate-400 mt-1">₹${bill.amount}</p></div>${action}</div>`;
            });
            window.renderElectricity();
        }

        window.renderElectricity = function() {
            const filter = document.getElementById('house-filter').value;
            let elecs = window.billsData.filter(b => b.category === 'electricity');
            if(filter !== 'ALL') elecs = elecs.filter(b => b.title.startsWith(filter));

            const list = document.getElementById('electricity-list'); list.innerHTML = '';
            
            elecs.forEach(bill => {
                const isPaid = bill.status === 'paid';
                let house = bill.title; let month = "Current";
                if (bill.title.includes(' - ')) { const parts = bill.title.split(' - '); month = parts.pop(); house = parts.join(' - '); }

                // Extract DB strings (C:12345|T:TXN987) that you saved from OCR
                let cnum = "N/A", tx = "N/A";
                if(bill.due_date && bill.due_date.includes('|')) {
                    const data = bill.due_date.split('|');
                    cnum = data[0].replace('C:', '').trim();
                    tx = data[1].replace('T:', '').trim();
                }

                const recUrl = `${VERCEL_RECEIPT}?am=${bill.amount}&title=${encodeURIComponent(house)}&cnum=${cnum}&tx=${tx}`;
                const action = isPaid ? `<a href="${recUrl}" class="px-3 py-2 rounded-lg bg-emerald-900/30 text-emerald-400 font-bold text-xs border border-emerald-800 flex items-center gap-1"><span class="material-icons-round text-xs">receipt_long</span> Receipt</a>` : `<a href="${VERCEL_PAY}?am=${bill.amount}&tn=${encodeURIComponent(bill.title)}" class="px-4 py-2 rounded-lg bg-yellow-500 text-yellow-950 font-bold text-xs shadow-md">Pay</a>`;
                
                let theme = isPaid ? 'bg-slate-800/50 border-slate-800 text-slate-500' : house==='MD' ? 'bg-purple-900/10 border-purple-800/50 text-purple-400' : house==='UD - STORE' ? 'bg-blue-900/10 border-blue-800/50 text-blue-400' : 'bg-emerald-900/10 border-emerald-800/50 text-emerald-400';

                list.innerHTML += `
                <div class="flex justify-between items-center p-4 rounded-xl border ${theme} ${isPaid?'opacity-60':''}">
                    <div>
                        <p class="font-bold text-white">${house}</p>
                        <p class="text-[10px] font-bold uppercase tracking-wider mt-1 text-slate-400">Month: <span class="text-white">${month}</span></p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right"><p class="text-lg font-extrabold text-white">₹${bill.amount}</p></div>
                        ${action}
                    </div>
                </div>`;
            });
        }
        window.loadData();
    </script>
</body>
</html>
