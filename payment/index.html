<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Family Hub App</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0F172A", accent: "#3B82F6", 
                        "background-light": "#F8FAFC", "background-dark": "#0B1120", 
                        "card-light": "#FFFFFF", "card-dark": "#1E293B"
                    },
                    fontFamily: { display: ["Inter", "sans-serif"] },
                },
            },
        };
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; min-height: 100vh; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        body.modal-open { overflow: hidden; }
        
        /* View transitions */
        .view-container { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen flex flex-col antialiased">
    
    <header class="px-6 py-5 flex justify-between items-center shrink-0 sticky top-0 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md z-40 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
            <button id="btn-back" class="hidden h-10 w-10 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 active:scale-95 transition" onclick="showView('home')">
                <span class="material-icons-round">arrow_back</span>
            </button>
            
            <div>
                <h1 id="header-title" class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Family Hub</h1>
                <p id="header-subtitle" class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Utility & Recharge Center</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300 transition-colors" onclick="manualRefresh()">
                <span id="refresh-icon" class="material-icons-round text-xl">refresh</span>
            </button>
            <button class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
                <span class="material-icons-round text-xl">brightness_4</span>
            </button>
        </div>
    </header>

    <main class="flex-1 px-4 py-6 relative max-w-lg w-full mx-auto">
        
        <div id="view-home" class="view-container flex flex-col gap-6 h-full justify-center pb-20">
            <div class="text-center mb-4">
                <h2 class="text-xl font-bold text-slate-700 dark:text-slate-300">What would you like to pay?</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div onclick="showView('recharge')" class="bg-card-light dark:bg-card-dark rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center text-center cursor-pointer active:scale-95 transition-transform hover:shadow-md">
                    <div class="w-16 h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center mb-4 shadow-inner">
                        <span class="material-icons-round text-3xl">smartphone</span>
                    </div>
                    <h3 class="font-bold text-slate-900 dark:text-white leading-tight">Mobile<br>Recharge</h3>
                    <span id="badge-recharge" class="mt-3 text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 px-3 py-1 rounded-full">Loading...</span>
                </div>

                <div onclick="showView('electricity')" class="bg-card-light dark:bg-card-dark rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center text-center cursor-pointer active:scale-95 transition-transform hover:shadow-md">
                    <div class="w-16 h-16 rounded-2xl bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400 flex items-center justify-center mb-4 shadow-inner">
                        <span class="material-icons-round text-3xl">bolt</span>
                    </div>
                    <h3 class="font-bold text-slate-900 dark:text-white leading-tight">Electricity<br>Postpaid</h3>
                    <span id="badge-electricity" class="mt-3 text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 px-3 py-1 rounded-full">Loading...</span>
                </div>
            </div>
        </div>

        <div id="view-recharge" class="view-container hidden flex flex-col gap-4">
            <h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-1">Active Connections</h3>
            <div id="recharge-list" class="flex flex-col gap-3"></div>
        </div>

        <div id="view-electricity" class="view-container hidden flex flex-col gap-4">
            <div class="flex items-center justify-between px-1">
                <h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Registered Houses</h3>
                
                <select id="house-filter" onchange="renderElectricity()" class="text-xs font-bold bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg px-3 py-2 border-none outline-none focus:ring-2 focus:ring-accent cursor-pointer shadow-sm">
                    <option value="ALL">All Houses</option>
                    <option value="MD">MD</option>
                    <option value="UD - STORE">UD - STORE</option>
                    <option value="UD - MAIN HOUSE">UD - MAIN HOUSE</option>
                </select>
            </div>
            
            <div id="electricity-list" class="flex flex-col gap-3"></div>
        </div>

    </main>

    <div id="bill-modal" class="fixed inset-0 z-[100] hidden flex flex-col justify-end">
        <div id="modal-backdrop" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity opacity-0" onclick="closeModal()"></div>
        <div id="modal-content" class="relative bg-background-light dark:bg-background-dark w-full max-w-lg mx-auto rounded-t-3xl shadow-2xl flex flex-col transition-transform transform translate-y-full duration-300 ease-out">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
                <h2 class="text-lg font-bold">Payment Details</h2>
                <button onclick="closeModal()" class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300 transition hover:bg-slate-300 dark:hover:bg-slate-700">
                    <span class="material-icons-round text-[20px]">close</span>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-6">
                <div class="relative overflow-hidden rounded-2xl bg-slate-800 shadow-lg">
                    <div class="absolute inset-0 opacity-20 pointer-events-none bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-400 via-transparent to-transparent"></div>
                    <div class="relative z-10 flex flex-col items-center p-6 text-center gap-2">
                        <div id="modal-icon-container" class="flex h-14 w-14 items-center justify-center rounded-full bg-blue-500/20 text-blue-400 mb-1">
                            <span id="modal-icon" class="material-icons-round text-3xl">bolt</span>
                        </div>
                        <div>
                            <p id="modal-title" class="text-slate-300 text-sm font-medium tracking-wider mb-1">Loading...</p>
                            <h2 id="modal-amount" class="text-4xl font-extrabold text-white tracking-tight">₹ 0</h2>
                        </div>
                    </div>
                </div>
                <div class="rounded-xl bg-white dark:bg-card-dark shadow-sm overflow-hidden border border-slate-100 dark:border-slate-800 divide-y divide-slate-100 dark:divide-slate-800">
                    <div class="flex items-center justify-between p-4">
                        <span class="text-sm font-medium text-slate-500">Service</span>
                        <span id="modal-category" class="text-sm font-bold capitalize text-slate-900 dark:text-white">N/A</span>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-red-50 dark:bg-red-900/10">
                        <span class="text-sm font-medium text-red-600 dark:text-red-400">Due Date</span>
                        <span id="modal-date" class="text-sm font-bold text-red-700 dark:text-red-300">N/A</span>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 pb-8">
                <a id="modal-pay-btn" href="#" target="_top" class="flex h-14 w-full items-center justify-center gap-2 rounded-2xl bg-accent px-4 text-lg font-bold text-white shadow-lg shadow-blue-500/30 active:scale-[0.98]">
                    <span class="material-icons-round">payment</span>
                    Proceed to App Gateway
                </a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else { document.documentElement.classList.remove('dark') }

        function showView(viewId) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-recharge').classList.add('hidden');
            document.getElementById('view-electricity').classList.add('hidden');
            
            const btnBack = document.getElementById('btn-back');
            const title = document.getElementById('header-title');
            const subtitle = document.getElementById('header-subtitle');

            if (viewId === 'home') {
                btnBack.classList.add('hidden');
                title.innerText = 'Family Hub';
                subtitle.innerText = 'Utility & Recharge Center';
                document.getElementById('view-home').classList.remove('hidden');
            } else if (viewId === 'recharge') {
                btnBack.classList.remove('hidden');
                title.innerText = 'Recharges';
                subtitle.innerText = 'Manage Mobile Connections';
                document.getElementById('view-recharge').classList.remove('hidden');
            } else if (viewId === 'electricity') {
                btnBack.classList.remove('hidden');
                title.innerText = 'Electricity';
                subtitle.innerText = 'Postpaid House Bills';
                document.getElementById('view-electricity').classList.remove('hidden');
                // Optional: Reset filter to ALL when entering view
                document.getElementById('house-filter').value = "ALL";
                if(window.renderElectricity) window.renderElectricity(); 
            }
        }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabase = createClient(
            'https://hzwjzpwhjpkwbnevylcr.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6d2p6cHdoanBrd2JuZXZ5bGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDA1MzEsImV4cCI6MjA4NzA3NjUzMX0.3p7DkH9IqClw8P_FbAUJnCaX6jflsb9HchbHDnd3J1M'
        );

        const VERCEL_API_URL = "https://ankush-worksltd.vercel.app/api/pay";

        window.billsData = [];

        window.manualRefresh = async function() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spin-anim');
            await window.loadData();
            setTimeout(() => icon.classList.remove('spin-anim'), 500);
        }

        window.loadData = async function() {
            const { data, error } = await supabase.from('family_bills').select('*').order('id', { ascending: true });
            if (error) return;

            window.billsData = data;
            const recharges = data.filter(b => b.category === 'mobile');
            const electricity = data.filter(b => b.category === 'electricity');

            // --- UPDATE HOME BADGES ---
            const pendingRec = recharges.filter(b => b.status === 'pending').length;
            const pendingElec = electricity.filter(b => b.status === 'pending').length;

            const recBadge = document.getElementById('badge-recharge');
            if(pendingRec > 0) {
                recBadge.innerText = `${pendingRec} Action Required`;
                recBadge.className = "mt-3 text-[10px] font-bold bg-red-100 dark:bg-red-900/30 text-red-600 px-3 py-1 rounded-full animate-pulse";
            } else {
                recBadge.innerText = "All Settled";
                recBadge.className = "mt-3 text-[10px] font-bold bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 px-3 py-1 rounded-full";
            }

            const elecBadge = document.getElementById('badge-electricity');
            if(pendingElec > 0) {
                elecBadge.innerText = `${pendingElec} Action Required`;
                elecBadge.className = "mt-3 text-[10px] font-bold bg-red-100 dark:bg-red-900/30 text-red-600 px-3 py-1 rounded-full animate-pulse";
            } else {
                elecBadge.innerText = "All Settled";
                elecBadge.className = "mt-3 text-[10px] font-bold bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 px-3 py-1 rounded-full";
            }

            // --- RENDER RECHARGES ---
            const rechargeList = document.getElementById('recharge-list');
            rechargeList.innerHTML = '';
            
            recharges.forEach(bill => {
                const isPaid = bill.status === 'paid';
                const opacityClass = isPaid ? 'opacity-60 grayscale-[30%]' : '';
                
                const actionHtml = isPaid 
                    ? `<span class="h-10 px-4 flex items-center justify-center rounded-lg bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 font-bold text-sm"><span class="material-icons-round text-sm mr-1">check_circle</span> Paid</span>`
                    : `<button onclick="openModal('${bill.id}')" class="h-10 px-4 flex items-center justify-center rounded-lg bg-accent text-white font-bold text-sm shadow-md active:scale-95 transition">Pay</button>`;

                const dateColor = isPaid ? 'text-slate-500' : 'text-red-500';
                const dateText = isPaid ? 'Settled' : `Ends: ${bill.due_date || 'N/A'}`;

                rechargeList.innerHTML += `
                <div class="flex items-center justify-between p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-card-light dark:bg-slate-800/50 shadow-sm ${opacityClass}">
                    <div>
                        <p class="font-bold text-slate-900 dark:text-white">${bill.title}</p>
                        <p class="text-xs font-medium ${dateColor} mt-0.5">${dateText}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500 uppercase font-bold">Amount</p>
                            <p class="font-bold text-slate-900 dark:text-white">₹ ${bill.amount}</p>
                        </div>
                        ${actionHtml}
                    </div>
                </div>`;
            });

            // Trigger the initial electricity render
            window.renderElectricity();
        }

        // --- NEW REAL-TIME ELECTRICITY RENDERER WITH FILTERING ---
        window.renderElectricity = function() {
            const elecList = document.getElementById('electricity-list');
            elecList.innerHTML = '';
            
            // Get the current selected filter value (ALL, MD, etc.)
            const filterVal = document.getElementById('house-filter').value;
            
            // Start with all electricity bills
            let electricity = window.billsData.filter(b => b.category === 'electricity');
            
            // Apply the filter if it's not 'ALL'
            if (filterVal !== 'ALL') {
                // Since our titles are generated as "MD - Jan", we can filter by checking if it starts with the house name
                electricity = electricity.filter(b => b.title.startsWith(filterVal));
            }

            if (electricity.length === 0) {
                elecList.innerHTML = `
                    <div class="text-center py-8 bg-card-light dark:bg-card-dark rounded-xl border border-dashed border-slate-200 dark:border-slate-800">
                        <span class="material-icons-round text-4xl text-slate-300 dark:text-slate-600 mb-2">inbox</span>
                        <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">No bills found for this selection.</p>
                    </div>`;
                return;
            }

            electricity.forEach((bill) => {
                const isPaid = bill.status === 'paid';
                const opacityClass = isPaid ? 'opacity-60 grayscale-[30%]' : '';
                
                // Parse "UD - MAIN HOUSE - Jan" back into House & Month
                let houseName = bill.title;
                let monthText = "Current Month";
                
                if (bill.title.includes(' - ')) {
                    const lastDash = bill.title.lastIndexOf(' - ');
                    houseName = bill.title.substring(0, lastDash).trim();
                    monthText = bill.title.substring(lastDash + 3).trim();
                }

                // Auto Color Coding for the 3 Houses
                let colorClass = 'bg-yellow-50/50 dark:bg-yellow-900/10 border-yellow-200 dark:border-yellow-800/50';
                let iconColor = 'text-yellow-600 dark:text-yellow-400';
                let iconBg = 'bg-yellow-100 dark:bg-yellow-900/30';

                if (!isPaid) {
                    if (houseName === 'MD') {
                        colorClass = 'bg-purple-50/50 dark:bg-purple-900/10 border-purple-200 dark:border-purple-800/50';
                        iconColor = 'text-purple-600 dark:text-purple-400'; iconBg = 'bg-purple-100 dark:bg-purple-900/30';
                    } else if (houseName === 'UD - STORE') {
                        colorClass = 'bg-blue-50/50 dark:bg-blue-900/10 border-blue-200 dark:border-blue-800/50';
                        iconColor = 'text-blue-600 dark:text-blue-400'; iconBg = 'bg-blue-100 dark:bg-blue-900/30';
                    } else if (houseName === 'UD - MAIN HOUSE') {
                        colorClass = 'bg-emerald-50/50 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-800/50';
                        iconColor = 'text-emerald-600 dark:text-emerald-400'; iconBg = 'bg-emerald-100 dark:bg-emerald-900/30';
                    }
                } else {
                    colorClass = 'bg-card-light dark:bg-slate-800/50 border-slate-100 dark:border-slate-800';
                    iconColor = 'text-slate-500'; iconBg = 'bg-slate-100 dark:bg-slate-800';
                }
                
                const actionHtml = isPaid 
                    ? `<span class="h-10 px-4 flex items-center justify-center rounded-lg bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 font-bold text-sm"><span class="material-icons-round text-sm mr-1">check_circle</span> Settled</span>`
                    : `<button onclick="openModal('${bill.id}')" class="h-10 px-4 flex items-center justify-center rounded-lg bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-sm shadow-md active:scale-95 transition">Pay</button>`;

                elecList.innerHTML += `
                <div class="flex items-center justify-between p-4 rounded-xl border ${colorClass} ${opacityClass}">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${iconBg} ${iconColor} shadow-inner shrink-0">
                            <span class="material-icons-round text-[20px]">home</span>
                        </div>
                        <div>
                            <p class="font-extrabold text-slate-900 dark:text-white leading-tight">${houseName}</p>
                            <p class="text-xs font-bold text-slate-500 mt-0.5 uppercase tracking-wider">Month: <span class="text-accent">${monthText}</span></p>
                            ${bill.due_date ? `<p class="text-[10px] font-bold text-red-500 mt-1 uppercase tracking-wider">Due: ${bill.due_date}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500 uppercase font-bold">Amount</p>
                            <p class="font-bold text-slate-900 dark:text-white text-lg">₹ ${bill.amount}</p>
                        </div>
                        ${actionHtml}
                    </div>
                </div>`;
            });
        }

        window.openModal = function(id) {
            const bill = window.billsData.find(b => b.id === id);
            if (!bill) return;

            document.getElementById('modal-title').innerText = bill.title;
            document.getElementById('modal-amount').innerText = `₹ ${bill.amount}`;
            document.getElementById('modal-date').innerText = bill.due_date || 'N/A';
            
            let icon = 'smartphone', catText = 'Mobile Recharge';
            if(bill.category === 'electricity') { icon = 'bolt'; catText = 'Electricity Postpaid'; }
            
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-category').innerText = catText;
            
            const gatewayUrl = `${VERCEL_API_URL}?am=${bill.amount}&tn=${encodeURIComponent(bill.title)}`;
            document.getElementById('modal-pay-btn').href = gatewayUrl;

            const modal = document.getElementById('bill-modal');
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            document.body.classList.add('modal-open');
            setTimeout(() => { backdrop.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }

        window.closeModal = function() {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            setTimeout(() => { document.getElementById('bill-modal').classList.add('hidden'); document.body.classList.remove('modal-open'); }, 300);
        }

        loadData();
    </script>
</body>
</html>
