<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Family Hub App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { accent: "#3B82F6", "background-light": "#F8FAFC", "card-light": "#FFFFFF" } } } };</script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #0F172A; min-height: 100vh; overflow-x: hidden; } 
        ::-webkit-scrollbar { display: none; }
        .view-container { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        body.modal-open { overflow: hidden; }
    </style>
</head>
<body class="flex flex-col antialiased">
    
    <header class="px-6 py-5 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-40 border-b border-slate-200 shadow-sm">
        <div class="flex items-center gap-3">
            <button id="btn-back" class="hidden h-10 w-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 active:scale-95 transition" onclick="showView('home')"><span class="material-icons-round">arrow_back</span></button>
            <div>
                <h1 id="header-title" class="text-2xl font-extrabold tracking-tight text-slate-900">Family Hub</h1>
                <p id="header-subtitle" class="text-xs text-slate-500 font-medium">Utility Center</p>
            </div>
        </div>
        <button class="p-2 rounded-full bg-slate-100 text-slate-600 active:scale-95 transition" onclick="window.loadData()"><span class="material-icons-round">refresh</span></button>
    </header>

    <main class="flex-1 px-4 py-6 max-w-lg w-full mx-auto relative">
        <div id="view-home" class="view-container flex flex-col gap-6 justify-center h-full pb-20">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="showView('recharge')" class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm flex flex-col items-center text-center cursor-pointer active:scale-95 transition hover:shadow-md">
                    <div class="w-16 h-16 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center mb-4 shadow-inner border border-blue-100"><span class="material-icons-round text-3xl">smartphone</span></div>
                    <h3 class="font-bold text-slate-900">Mobile<br>Recharge</h3>
                    <span id="badge-recharge" class="mt-3 text-[10px] font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full">Loading...</span>
                </div>
                <div onclick="showView('electricity')" class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm flex flex-col items-center text-center cursor-pointer active:scale-95 transition hover:shadow-md">
                    <div class="w-16 h-16 rounded-2xl bg-yellow-50 text-yellow-500 flex items-center justify-center mb-4 shadow-inner border border-yellow-100"><span class="material-icons-round text-3xl">bolt</span></div>
                    <h3 class="font-bold text-slate-900">Electricity<br>Postpaid</h3>
                    <span id="badge-electricity" class="mt-3 text-[10px] font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full">Loading...</span>
                </div>
            </div>
        </div>

        <div id="view-recharge" class="view-container hidden flex-col gap-4">
            <h3 class="text-sm font-bold text-slate-500 uppercase px-1">Active Connections</h3>
            <div id="recharge-list" class="flex flex-col gap-3"></div>
        </div>

        <div id="view-electricity" class="view-container hidden flex-col gap-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-sm font-bold text-slate-500 uppercase">Registered Houses</h3>
                <select id="house-filter" onchange="renderElectricity()" class="text-xs font-bold bg-slate-100 text-slate-700 rounded-lg px-3 py-2 border border-slate-200 outline-none">
                    <option value="ALL">All Houses</option><option value="MD">MD</option><option value="UD - STORE">UD - STORE</option><option value="UD - MAIN HOUSE">UD - MAIN HOUSE</option>
                </select>
            </div>
            <div id="electricity-list" class="flex flex-col gap-3"></div>
        </div>
    </main>

    <div id="bill-modal" class="fixed inset-0 z-[100] hidden flex flex-col justify-end">
        <div id="modal-backdrop" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0" onclick="closeModal()"></div>
        <div id="modal-content" class="relative bg-white w-full max-w-lg mx-auto rounded-t-3xl shadow-2xl flex flex-col transition-transform transform translate-y-full duration-300 ease-out border-t border-slate-200">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                <h2 class="text-lg font-bold text-slate-900">Payment Details</h2>
                <button onclick="closeModal()" class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-100 text-slate-600 transition active:scale-95 hover:bg-slate-200"><span class="material-icons-round text-[20px]">close</span></button>
            </div>
            <div class="p-6 flex flex-col gap-6">
                <div class="relative overflow-hidden rounded-2xl bg-white border border-slate-200 shadow-sm">
                    <div class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-500 via-transparent to-transparent"></div>
                    <div class="relative z-10 flex flex-col items-center p-6 text-center gap-2">
                        <div class="flex h-14 w-14 items-center justify-center rounded-full bg-blue-50 text-blue-600 mb-1 border border-blue-100"><span id="modal-icon" class="material-icons-round text-3xl">bolt</span></div>
                        <div>
                            <p id="modal-title" class="text-slate-500 text-sm font-bold tracking-wider mb-1">Loading...</p>
                            <h2 id="modal-amount" class="text-4xl font-extrabold text-slate-900 tracking-tight">₹ 0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-slate-100 pb-8 bg-slate-50 rounded-t-3xl">
                <a id="modal-pay-btn" href="#" target="_top" class="flex h-14 w-full items-center justify-center gap-2 rounded-2xl bg-blue-600 text-lg font-bold text-white shadow-lg shadow-blue-500/30 active:scale-[0.98] transition">
                    <span class="material-icons-round">payment</span> Proceed to App Gateway
                </a>
            </div>
        </div>
    </div>

    <script>
        function showView(id) {
            ['home', 'recharge', 'electricity'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${id}`).classList.remove('hidden');
            document.getElementById('btn-back').classList.toggle('hidden', id === 'home');
            document.getElementById('header-title').innerText = id === 'home' ? 'Family Hub' : id === 'recharge' ? 'Recharges' : 'Electricity';
            document.getElementById('header-subtitle').innerText = id === 'home' ? 'Utility Center' : id === 'recharge' ? 'Mobile Connections' : 'Postpaid Bills';
            if(id === 'electricity' && window.renderElectricity) { document.getElementById('house-filter').value = "ALL"; window.renderElectricity(); }
        }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient('https://hzwjzpwhjpkwbnevylcr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6d2p6cHdoanBrd2JuZXZ5bGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDA1MzEsImV4cCI6MjA4NzA3NjUzMX0.3p7DkH9IqClw8P_FbAUJnCaX6jflsb9HchbHDnd3J1M');
        
        const VERCEL_PAY = "https://ankush-worksltd.vercel.app/api/pay";

        window.billsData = [];

        window.loadData = async function() {
            const { data } = await supabase.from('family_bills').select('*').order('id');
            window.billsData = data || [];
            
            const recs = window.billsData.filter(b => b.category === 'mobile');
            const elecs = window.billsData.filter(b => b.category === 'electricity');

            const upBadge = (id, count) => { const el = document.getElementById(id); if(count>0){ el.innerText=`${count} Action Required`; el.className="mt-3 text-[10px] font-bold bg-red-100 text-red-600 px-3 py-1 rounded-full animate-pulse"; }else{ el.innerText="All Settled"; el.className="mt-3 text-[10px] font-bold bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full"; }};
            upBadge('badge-recharge', recs.filter(b=>b.status==='pending').length);
            upBadge('badge-electricity', elecs.filter(b=>b.status==='pending').length);

            const recList = document.getElementById('recharge-list'); recList.innerHTML = '';
            recs.forEach(bill => {
                const isPaid = bill.status === 'paid';
                const action = isPaid 
                    ? `<span class="px-4 py-2 rounded-lg bg-emerald-50 text-emerald-600 font-bold text-xs border border-emerald-200 flex items-center gap-1"><span class="material-icons-round text-[14px]">check_circle</span> Settled</span>` 
                    : `<button onclick="openModal('${bill.id}')" class="px-5 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md">Pay</button>`;
                
                recList.innerHTML += `<div class="flex justify-between items-center p-4 rounded-xl border border-slate-200 bg-white shadow-sm ${isPaid?'opacity-60 grayscale-[20%]':''}"><div><p class="font-bold text-slate-900 text-sm">${bill.title}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Due: ${bill.due_date || 'N/A'}</p></div><div class="flex items-center gap-3"><div class="text-right"><p class="text-[10px] text-slate-500 uppercase font-bold">Amount</p><p class="font-bold text-slate-900">₹${bill.amount}</p></div>${action}</div></div>`;
            });
            window.renderElectricity();
        }

        window.renderElectricity = function() {
            const filter = document.getElementById('house-filter').value;
            let elecs = window.billsData.filter(b => b.category === 'electricity');
            if(filter !== 'ALL') elecs = elecs.filter(b => b.title.startsWith(filter));

            const list = document.getElementById('electricity-list'); list.innerHTML = '';
            
            elecs.forEach(bill => {
                const isPaid = bill.status === 'paid';
                let house = bill.title; let month = "Current";
                if (bill.title.includes(' - ')) { const parts = bill.title.split(' - '); month = parts.pop(); house = parts.join(' - '); }

                const action = isPaid 
                    ? `<span class="px-4 py-2 rounded-lg bg-emerald-50 text-emerald-600 font-bold text-xs border border-emerald-200 flex items-center gap-1"><span class="material-icons-round text-xs">check_circle</span> Settled</span>` 
                    : `<button onclick="openModal('${bill.id}')" class="px-4 py-2 rounded-lg bg-yellow-400 text-yellow-900 font-bold text-xs shadow-md">Pay</button>`;
                
                let theme = isPaid ? 'bg-slate-50 border-slate-200 text-slate-500' : house==='MD' ? 'bg-purple-50 border-purple-200 text-purple-700' : house==='UD - STORE' ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-emerald-50 border-emerald-200 text-emerald-700';

                list.innerHTML += `
                <div class="flex justify-between items-center p-4 rounded-xl border ${theme} ${isPaid?'opacity-60 grayscale-[20%]':''}">
                    <div>
                        <p class="font-bold text-slate-900">${house}</p>
                        <p class="text-[10px] font-bold uppercase tracking-wider mt-1 text-slate-500">Month: <span class="text-slate-900">${month}</span></p>
                        ${!isPaid && bill.due_date ? `<p class="text-[10px] font-bold text-red-500 mt-0.5 uppercase tracking-wider">Due: ${bill.due_date}</p>` : ''}
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right"><p class="text-[10px] text-slate-500 uppercase font-bold">Amount</p><p class="text-lg font-extrabold text-slate-900 leading-tight">₹${bill.amount}</p></div>
                        ${action}
                    </div>
                </div>`;
            });
        }

        window.openModal = function(id) {
            const bill = window.billsData.find(b => b.id === id);
            if (!bill) return;

            document.getElementById('modal-title').innerText = bill.title;
            document.getElementById('modal-amount').innerText = `₹ ${bill.amount}`;
            
            let icon = 'smartphone';
            if(bill.category === 'electricity') { icon = 'bolt'; }
            
            document.getElementById('modal-icon').innerText = icon;
            
            const gatewayUrl = `${VERCEL_PAY}?am=${bill.amount}&tn=${encodeURIComponent(bill.title)}`;
            document.getElementById('modal-pay-btn').href = gatewayUrl;

            const modal = document.getElementById('bill-modal');
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden'); document.body.classList.add('modal-open');
            setTimeout(() => { backdrop.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }

        window.closeModal = function() {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.add('opacity-0'); content.classList.add('translate-y-full');
            setTimeout(() => { document.getElementById('bill-modal').classList.add('hidden'); document.body.classList.remove('modal-open'); }, 300);
        }

        loadData();
    </script>
</body>
</html>
